server:
  port: 8083
spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/fitnessrecommendation}
      database: ${MONGODB_DATABASE:fitnessrecommendation}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
eureka:
  instance:
    hostname: ${RENDER_SERVICE_NAME:localhost}
    prefer-ip-address: false
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=}
    key: ${GEMINI_API_KEY:default_dummy_key}