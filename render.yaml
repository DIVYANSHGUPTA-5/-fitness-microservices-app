services:
  # 1. Eureka Server
  - type: web
    name: eureka-server
    env: docker
    dockerContext: eureka
    dockerfilePath: eureka/Dockerfile
    plan: free
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: RENDER_SERVICE_NAME
        value: eureka-server

  # 2. Config Server
  - type: web
    name: config-server
    env: docker
    dockerContext: configserver
    dockerfilePath: configserver/Dockerfile
    plan: free
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: RENDER_SERVICE_NAME
        value: config-server
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:10000/eureka/

  # 3. API Gateway
  - type: web
    name: api-gateway
    env: docker
    dockerContext: gateway
    dockerfilePath: gateway/Dockerfile
    plan: free
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: RENDER_SERVICE_NAME
        value: api-gateway
      - key: CONFIG_SERVER_URL
        value: http://config-server:10000
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:10000/eureka/
      - key: SPRING_CLOUD_CONFIG_FAIL_FAST
        value: "true"

  # 4. User Service
  - type: web
    name: user-service
    env: docker
    dockerContext: userservice
    dockerfilePath: userservice/Dockerfile
    plan: free
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: RENDER_SERVICE_NAME
        value: user-service
      - key: CONFIG_SERVER_URL
        value: http://config-server:10000
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:10000/eureka/
      - key: SPRING_CLOUD_CONFIG_FAIL_FAST
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-user-db
          property: connectionString

  # 5. Activity Service
  - type: web
    name: activity-service
    env: docker
    dockerContext: activityservice
    dockerfilePath: activityservice/Dockerfile
    plan: free
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: RENDER_SERVICE_NAME
        value: activity-service
      - key: CONFIG_SERVER_URL
        value: http://config-server:10000
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:10000/eureka/
      - key: SPRING_CLOUD_CONFIG_FAIL_FAST
        value: "true"
      - key: MONGODB_URI
        sync: false

  # 6. AI Service
  - type: web
    name: ai-service
    env: docker
    dockerContext: aiservice
    dockerfilePath: aiservice/Dockerfile
    plan: free
    envVars:
      - key: SERVER_PORT
        value: "10000"
      - key: RENDER_SERVICE_NAME
        value: ai-service
      - key: CONFIG_SERVER_URL
        value: http://config-server:10000
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:10000/eureka/
      - key: SPRING_CLOUD_CONFIG_FAIL_FAST
        value: "true"
      - key: GEMINI_API_KEY
        sync: false

  # 7. Frontend
  - type: web
    name: fitness-app-frontend
    env: docker
    dockerContext: fitness-app-frontend
    dockerfilePath: fitness-app-frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_GATEWAY_URL
        fromService:
          name: api-gateway
          type: web
          property: host

databases:
  - name: fitness-user-db
    databaseName: fitness_user_db
    user: divyansh
    plan: free