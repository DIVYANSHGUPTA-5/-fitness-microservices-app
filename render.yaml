services:
  # 1. Eureka Server
  - type: web
    name: eureka-server
    env: docker
    dockerContext: eureka
    plan: free
    envVars:
      - key: RENDER_SERVICE_NAME
        value: eureka-server

  # 2. Config Server
  - type: web
    name: config-server
    env: docker
    dockerContext: configserver
    plan: free
    envVars:
      - key: RENDER_SERVICE_NAME
        value: config-server
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/

  # 3. API Gateway
  - type: web
    name: api-gateway
    env: docker
    dockerContext: gateway
    plan: free
    envVars:
      - key: RENDER_SERVICE_NAME
        value: api-gateway
      - key: CONFIG_SERVER_URL
        value: http://config-server:8888
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/

  # 4. User Service
  - type: web
    name: user-service
    env: docker
    dockerContext: userservice
    plan: free
    envVars:
      - key: RENDER_SERVICE_NAME
        value: user-service
      - key: CONFIG_SERVER_URL
        value: http://config-server:8888
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-user-db
          property: connectionString

  # 5. Activity Service
  - type: web
    name: activity-service
    env: docker
    dockerContext: activityservice
    plan: free
    envVars:
      - key: RENDER_SERVICE_NAME
        value: activity-service
      - key: CONFIG_SERVER_URL
        value: http://config-server:8888
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/
      # MongoDB URI should be provided in Render dashboard (e.g. Atlas)
      - key: MONGODB_URI
        sync: false

  # 6. AI Service
  - type: web
    name: ai-service
    env: docker
    dockerContext: aiservice
    plan: free
    envVars:
      - key: RENDER_SERVICE_NAME
        value: ai-service
      - key: CONFIG_SERVER_URL
        value: http://config-server:8888
      - key: EUREKA_SERVER_URL
        value: http://eureka-server:8761/eureka/
      - key: GEMINI_API_KEY
        sync: false

  # 7. Frontend
  - type: web
    name: fitness-app-frontend
    env: docker
    dockerContext: fitness-app-frontend
    plan: free
    envVars:
      - key: VITE_API_GATEWAY_URL
        fromService:
          name: api-gateway
          type: web
          property: host

databases:
  - name: fitness-user-db
    databaseName: fitness_user_db
    user: divyansh
    plan: free