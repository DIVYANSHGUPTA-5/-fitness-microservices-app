# thus is not deploying on render as due to few things it is  not coming under free tier so down written file is for free


services:
  # Eureka Server
  - type: web
    name: eureka-server
    env: docker
    dockerContext: eureka
    plan: free

  # Config Server
  - type: web
    name: config-server
    env: docker
    dockerContext: configserver
    plan: free
    envVars:
      - key: EUREKA_SERVER_URL
        value: https://eureka-server.onrender.com/eureka/

  # API Gateway (public)
  - type: web
    name: api-gateway
    env: docker
    dockerContext: gateway
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://config-server.onrender.com
      - key: EUREKA_SERVER_URL
        value: https://eureka-server.onrender.com/eureka/

  # User Service
  - type: web
    name: user-service
    env: docker
    dockerContext: userservice
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://config-server.onrender.com
      - key: EUREKA_SERVER_URL
        value: https://eureka-server.onrender.com/eureka/

  # Activity Service
  - type: web
    name: activity-service
    env: docker
    dockerContext: activityservice
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://config-server.onrender.com
      - key: EUREKA_SERVER_URL
        value: https://eureka-server.onrender.com/eureka/
      - key: MONGODB_URI
        sync: false

  # AI Service
  - type: web
    name: ai-service
    env: docker
    dockerContext: aiservice
    plan: free
    envVars:
      - key: CONFIG_SERVER_URL
        value: https://config-server.onrender.com
      - key: EUREKA_SERVER_URL
        value: https://eureka-server.onrender.com/eureka/
      - key: GEMINI_API_KEY
        sync: false

  # Frontend
  - type: web
    name: fitness-app-frontend
    env: docker
    dockerContext: fitness-app-frontend
    plan: free